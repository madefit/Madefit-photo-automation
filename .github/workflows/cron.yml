name: Automation Cron Jobs

on:
  schedule:
    # Run once every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  run-crons:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Instagram Sync
        run: |
          curl -X GET "https://madefit-photo-automation.vercel.app/api/cron/instagram-sync" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          
      - name: Trigger Retry Failed
        run: |
          curl -X GET "https://madefit-photo-automation.vercel.app/api/cron/retry-failed" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          
      - name: Trigger Cleanup
        run: |
          curl -X GET "https://madefit-photo-automation.vercel.app/api/cron/cleanup" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

